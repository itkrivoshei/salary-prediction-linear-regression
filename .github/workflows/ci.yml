name: Python CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: python-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"

jobs:
  validate:
    name: Validate Python project
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[app,dev]"

      - name: Lint
        run: python -m ruff check .

      - name: Format check
        run: python -m ruff format --check .

      - name: Test
        run: python -m pytest -q

      - name: Compile modules
        run: python -m compileall -q app.py streamlit_app.py src tests

      - name: Import package
        run: python -c "import salary_prediction.model"

      - name: Import Streamlit app
        run: python -c "import streamlit_app"

      - name: Build Docker image
        run: docker build -t salary-prediction-linear-regression .
